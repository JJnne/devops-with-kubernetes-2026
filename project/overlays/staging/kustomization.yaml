apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: staging
resources:
  - ../../base
patches:
  - path: route-patch.yaml
    target:
      kind: HTTPRoute
      name: todo-app-route
  - path: broadcaster-configmap-patch.yaml
    target:
      kind: ConfigMap
      name: broadcaster-config

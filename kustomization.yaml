    newName: europe-north1-docker.pkg.dev/swift-clarity-380712/dwk-repo/todo-app
    newTag: "2.3"
  - name: PROJECT/TODO_BACKEND_IMAGE
    newName: europe-north1-docker.pkg.dev/swift-clarity-380712/dwk-repo/todo-backend
    newTag: "2.5"

apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: cpu-usage
  namespace: exercises
spec:
  metrics:
    - name: cpu-usage
      initialDelay: 1m
      successCondition: result < 0.5
      provider:
        prometheus:
          address: http://prom-prometheus-server.monitoring.svc.cluster.local
          query: |
            scalar(
              sum(rate(container_cpu_usage_seconds_total{namespace="exercises", container!=""}[5m]))
            )

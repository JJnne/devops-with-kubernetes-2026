apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-app-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong-app
  template:
    metadata:
      labels:
        app: ping-pong-app
    spec:
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: shared-data-claim
      containers:
        - name: ping-pong-app
          image: ping-pong-app:1.11
          volumeMounts:
            - name: shared-data
              mountPath: /usr/src/app/shared
